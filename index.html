<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>挺豪餐廳 - 客席即時監控面板</title>
    <script type="importmap">
      {
        "imports": {
          "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
          "firebase/database": "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js"
        }
      }
    </script>
    <style>
        body { font-family: system-ui, sans-serif; background-color: #0f172a; color: #f8fafc; padding: 30px; margin: 0; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #334155; padding-bottom: 20px; margin-bottom: 30px; }
        .title { font-size: 1.8rem; font-weight: bold; letter-spacing: 2px; color: #e2e8f0; }
        .total-badge { background: #3b82f6; padding: 6px 16px; border-radius: 50px; font-size: 1rem; font-weight: bold; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; }
        .monitor-card { background: #1e293b; border: 1px solid #334155; border-radius: 16px; padding: 20px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .card-num { font-size: 2.8rem; font-weight: bold; font-family: monospace; color: #38bdf8; margin-bottom: 5px; }
        .card-guests { font-size: 1rem; color: #94a3b8; margin-bottom: 15px; }
        .card-timer { font-size: 2rem; font-weight: bold; font-family: monospace; color: #ef4444; background: #2d1921; padding: 8px 0; border-radius: 8px; border: 1px solid #741b1b; }
        
        #noData { display: none; text-align: center; font-size: 1.2rem; color: #64748b; margin-top: 100px; width: 100%; grid-column: 1/-1; }
    </style>
</head>
<body>

    <div class="header">
        <div class="title">挺豪餐廳 - 現場用餐倒數監控大面板</div>
        <div class="total-badge">當前用餐桌數：<span id="totalTables">0</span> 桌</div>
    </div>

    <div class="grid" id="monitorGrid">
        <div id="noData">目前暫無客人在店內用餐</div>
    </div>

    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getDatabase, ref, onValue } from "firebase/database";

        const firebaseConfig = {
            apiKey: "AIzaSyDwUF4-rBRG9QGyti2_Smx_PRZ8sZOZL0A",
            authDomain: "my-queue-system-3bcc5.firebaseapp.com",
            databaseURL: "https://my-queue-system-3bcc5-default-rtdb.firebaseio.com",
            projectId: "my-queue-system-3bcc5",
            storageBucket: "my-queue-system-3bcc5.firebasestorage.app",
            messagingSenderId: "32354532851",
            appId: "1:32354532851:web:4ba48fcc31bb454399a686"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let activeTimers = [];

        onValue(ref(db, 'comboSystem'), (snapshot) => {
            // 清除舊定時器
            activeTimers.forEach(t => clearInterval(t));
            activeTimers = [];

            const grid = document.getElementById('monitorGrid');
            // 保留 noData 節點
            grid.innerHTML = '<div id="noData">目前暫無客人在店內用餐</div>';
            
            const data = snapshot.val() || {};
            let diningCount = 0;

            Object.keys(data).forEach(uid => {
                const item = data[uid];
                if (item.status === "dining") {
                    diningCount++;
                    
                    // 創立監控卡片
                    const card = document.createElement('div');
                    card.className = 'monitor-card';
                    card.id = `card_${uid}`;
                    
                    card.innerHTML = `
                        <div class="card-num">${item.ticketNumber}</div>
                        <div class="card-guests">入座人數：${item.guestsCount} 人</div>
                        <div class="card-timer" id="timer_${uid}">90:00</div>
                    `;
                    grid.appendChild(card);

                    // 綁定獨立倒數計時
                    setupMonitorClock(uid, item.startTime);
                }
            });

            document.getElementById('totalTables').innerText = diningCount;
            document.getElementById('noData').style.display = diningCount === 0 ? 'block' : 'none';
        });

        function setupMonitorClock(uid, startTime) {
            const totalSec = 90 * 60;
            const timerEl = document.getElementById(`timer_${uid}`);
            
            function updateClock() {
                const elapsed = Math.floor((Date.now() - startTime) / 1000);
                const remain = totalSec - elapsed;
                
                if (remain <= 0) {
                    if (timerEl) timerEl.innerText = "時間到";
                } else {
                    const m = Math.floor(remain / 60);
                    const s = remain % 60;
                    if (timerEl) timerEl.innerText = String(m).padStart(2,'0') + ":" + String(s).padStart(2,'0');
                }
            }
            
            updateClock();
            const clockInterval = setInterval(updateClock, 1000);
            activeTimers.push(clockInterval);
        }
    </script>
</body>
</html>
