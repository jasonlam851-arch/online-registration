<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大屏幕叫號顯示</title>
    <script type="importmap">
      {
        "imports": {
          "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
          "firebase/database": "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js"
        }
      }
    </script>
    <style>
        body { font-family: system-ui, sans-serif; background-color: #1a202c; color: white; margin: 0; padding: 20px; height: 100vh; display: flex; flex-direction: column; box-sizing: border-box; }
        .header { text-align: center; font-size: 3rem; font-weight: bold; padding: 20px 0; color: #f6ad55; letter-spacing: 2px; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; flex: 1; }
        .card { background: #2d3748; border-radius: 24px; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 4px solid #4a5568; }
        .card-a { border-color: #3182ce; }
        .card-b { border-color: #dd6b20; }
        .card-c { border-color: #38a169; }
        .title { font-size: 2.5rem; font-weight: bold; margin-bottom: 20px; }
        .number { font-size: 8rem; font-weight: bold; font-family: monospace; transition: all 0.3s; }
        .blink { animation: flash 0.8s infinite alternate; }
        @keyframes flash { from { opacity: 1; color: #e53e3e; } to { opacity: 0.3; } }
    </style>
</head>
<body>

    <div class="header">📢 請以下號碼到櫃檯</div>

    <div class="grid">
        <div class="card card-a">
            <div class="title" style="color: #63b3ed;">🧍 1人 (A組)</div>
            <div class="number" id="numA">A---</div>
        </div>
        <div class="card card-b">
            <div class="title" style="color: #fbd38d;">👨‍👦 2-3人 (B組)</div>
            <div class="number" id="numB">B---</div>
        </div>
        <div class="card card-c">
            <div class="title" style="color: #9ae6b4;">👨‍👩‍👧‍👦 4-5人 (C組)</div>
            <div class="number" id="numC">C---</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getDatabase, ref, onValue } from "firebase/database";

        const firebaseConfig = {
            apiKey: "AIzaSyDwUF4-rBRG9QGyti2_Smx_PRZ8sZOZL0A",
            authDomain: "my-queue-system-3bcc5.firebaseapp.com",
            databaseURL: "https://my-queue-system-3bcc5-default-rtdb.firebaseio.com",
            projectId: "my-queue-system-3bcc5",
            storageBucket: "my-queue-system-3bcc5.firebasestorage.app",
            messagingSenderId: "32354532851",
            appId: "1:32354532851:web:4ba48fcc31bb454399a686"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        let localData = { A: 0, B: 0, C: 0 };
        let isFirst = true;

        onValue(ref(db, 'queueSystem'), (snapshot) => {
            const data = snapshot.val() || {};
            ['A', 'B', 'C'].forEach(type => {
                const called = data[type]?.currentCalled || 0;
                const element = document.getElementById(`num${type}`);
                
                element.innerText = called > 0 ? type + String(called).padStart(3, '0') : type + "---";
                
                // 當有新號碼叫到時，閃爍提示並語音播報
                if (!isFirst && called > localData[type]) {
                    element.classList.add('blink');
                    setTimeout(() => element.classList.remove('blink'), 5000); // 閃爍5秒
                    speakNumber(type, called);
                }
                localData[type] = called;
            });
            isFirst = false;
        });

        function speakNumber(type, num) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                let groupName = type === 'A' ? '一人 A' : type === 'B' ? '二至三人 B' : '四至五人 C';
                let text = `請 ${groupName} ${num} 號到櫃檯`;
                let utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'zh-HK';
                utterance.rate = 0.9;
                window.speechSynthesis.speak(utterance);
            }
        }
    </script>
</body>
</html>
