<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>挺豪餐廳 - 現場大屏幕</title>
    <script type="importmap">
      {
        "imports": {
          "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
          "firebase/database": "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js"
        }
      }
    </script>
    <style>
        body { font-family: system-ui, sans-serif; background-color: #0f172a; color: #f8fafc; padding: 30px; margin: 0; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #334155; padding-bottom: 20px; margin-bottom: 30px; }
        .title { font-size: 1.8rem; font-weight: bold; letter-spacing: 2px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; }
        .monitor-card { background: #1e293b; border: 1px solid #334155; border-radius: 16px; padding: 20px; text-align: center; }
        .card-num { font-size: 2.8rem; font-weight: bold; color: #38bdf8; font-family: monospace; }
        .card-timer { font-size: 2.2rem; font-weight: bold; font-family: monospace; color: #ef4444; background: #2d1921; padding: 8px 0; border-radius: 8px; margin-top: 10px; }
        #unlockBar { background: #3b82f6; text-align: center; padding: 12px; font-weight: bold; border-radius: 8px; margin-bottom: 20px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="unlockBar" onclick="this.style.display='none'">點擊此處啟動大屏幕系統語音廣播功能</div>

    <div class="header">
        <div class="title">挺豪餐廳 - 客席時限與叫號綜合大屏幕</div>
        <div>在店用餐：<span id="totalTables" style="font-weight:bold; color:#38bdf8;">0</span> 桌</div>
    </div>

    <div class="grid" id="monitorGrid"></div>

    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getDatabase, ref, onValue } from "firebase/database";

        const firebaseConfig = {
            apiKey: "AIzaSyDwUF4-rBRG9QGyti2_Smx_PRZ8sZOZL0A",
            authDomain: "my-queue-system-3bcc5.firebaseapp.com",
            databaseURL: "https://my-queue-system-3bcc5-default-rtdb.firebaseio.com",
            projectId: "my-queue-system-3bcc5",
            storageBucket: "my-queue-system-3bcc5.firebasestorage.app",
            messagingSenderId: "32354532851",
            appId: "1:32354532851:web:4ba48fcc31bb454399a686"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let activeTimers = [];
        let serverOffset = 0;
        let previousCalledState = { A: 0, B: 0, C: 0 };
        let isFirstLoad = true;

        // 時差對齊
        onValue(ref(db, ".info/serverTimeOffset"), (snapshot) => { serverOffset = snapshot.val() || 0; });

        // 監聽全數據 (處理叫號發聲 + 用餐倒數)
        onValue(ref(db), (snapshot) => {
            const root = snapshot.val() || {};
            const queue = root.queueSystem || {};
            const combo = root.comboSystem || {};

            // 📢 1. 大屏幕大喇叭廣播語音叫號邏輯
            ['A', 'B', 'C'].forEach(g => {
                const current = queue[g]?.currentCalled || 0;
                // 只要號碼有變動，或者店員按了重複呼叫，就觸發語音
                if (current > 0 && (previousCalledState[g] !== current || (!isFirstLoad && queue[g]?.lastCallTimestamp))) {
                    if (!isFirstLoad || previousCalledState[g] !== current) {
                        broadcastVoiceCall(g, current);
                    }
                }
                previousCalledState[g] = current;
            });
            isFirstLoad = false;

            // ⏳ 2. 毫秒同步客席倒數卡片渲染
            activeTimers.forEach(t => clearInterval(t));
            activeTimers = [];
            const grid = document.getElementById('monitorGrid');
            grid.innerHTML = '';
            
            let count = 0;
            Object.keys(combo).forEach(uid => {
                const item = combo[uid];
                if (item.status === "dining") {
                    count++;
                    const card = document.createElement('div');
                    card.className = 'monitor-card';
                    card.innerHTML = `
                        <div class="card-num">${item.ticketNumber}</div>
                        <div style="color:#94a3b8; font-size:0.9rem;">人數：${item.guestsCount}人</div>
                        <div class="card-timer" id="mon_${uid}">90:00</div>
                    `;
                    grid.appendChild(card);
                    setupPreciseClock(uid, item.startTime);
                }
            });
            document.getElementById('totalTables').innerText = count;
        });

        function broadcastVoiceCall(type, num) {
            if ('speechSynthesis' in window) {
                let txt = type === 'A' ? '一人A' : type === 'B' ? '二至三人B' : '四至五人C';
                let msg = new SpeechSynthesisUtterance(`叮咚，請 ${txt} ${num} 號顧客前往櫃檯入座。`);
                msg.lang = 'zh-HK'; msg.rate = 0.9;
                window.speechSynthesis.speak(msg);
            }
        }

        function setupPreciseClock(uid, startTime) {
            const totalSec = 90 * 60;
            const el = document.getElementById(`mon_${uid}`);
            function update() {
                const exactNow = Date.now() + serverOffset;
                const elapsed = Math.floor((exactNow - startTime) / 1000);
                const remain = totalSec - elapsed;
                if (remain <= 0) { if(el) el.innerText = "時間到"; }
                else {
                    const m = Math.floor(remain / 60); const s = remain % 60;
                    if(el) el.innerText = String(m).padStart(2,'0') + ":" + String(s).padStart(2,'0');
                }
            }
            update();
            activeTimers.push(setInterval(update, 1000));
        }
    </script>
</body>
</html>
