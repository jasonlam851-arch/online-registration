<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>挺豪餐廳 - 叫號顯示系統</title>
    <script type="importmap">
      {
        "imports": {
          "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
          "firebase/database": "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js"
        }
      }
    </script>
    <style>
        body { font-family: system-ui, -apple-system, monospace; background-color: #121212; color: white; margin: 0; padding: 20px; height: 100vh; display: flex; flex-direction: column; box-sizing: border-box; overflow: hidden; }
        .rest-name { text-align: center; font-size: 3.5rem; font-weight: 700; padding: 15px 0; color: #d4af37; letter-spacing: 12px; margin-bottom: 20px; border-bottom: 3px solid rgba(212,175,55,0.2); text-transform: uppercase; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; flex: 1; margin-bottom: 20px; }
        .card { background: #1a1a1a; border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 4px solid #2a2a2a; }
        .title { font-size: 2.2rem; font-weight: bold; margin-bottom: 20px; letter-spacing: 2px; }
        .label-a { color: #63b3ed; }
        .label-b { color: #fbd38d; }
        .label-c { color: #9ae6b4; }
        .number { font-size: 9rem; font-weight: 700; color: white; font-family: Courier, monospace; transition: transform 0.2s; }
        .blink { animation: flashScreen 0.8s infinite alternate; }
        @keyframes flashScreen { from { color: white; } to { color: #e53e3e; text-shadow: 0 0 20px #e53e3e; } }
        .footer { font-size: 1rem; color: #555; text-align: center; letter-spacing: 3px; }
    </style>
</head>
<body>

    <div class="rest-name">挺豪餐廳</div>

    <div class="grid">
        <div class="card">
            <div class="title label-a">A組 (1人)</div>
            <div class="number" id="numA">A---</div>
        </div>
        <div class="card">
            <div class="title label-b">B組 (2-3人)</div>
            <div class="number" id="numB">B---</div>
        </div>
        <div class="card">
            <div class="title label-c">C組 (4-5人)</div>
            <div class="number" id="numC">C---</div>
        </div>
    </div>
    
    <div class="footer">請掃描二維碼登記，手機將提醒叫號</div>

    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getDatabase, ref, onValue } from "firebase/database";

        // Firebase 設定沿用
        const firebaseConfig = {
            apiKey: "AIzaSyDwUF4-rBRG9QGyti2_Smx_PRZ8sZOZL0A",
            authDomain: "my-queue-system-3bcc5.firebaseapp.com",
            databaseURL: "https://my-queue-system-3bcc5-default-rtdb.firebaseio.com",
            projectId: "my-queue-system-3bcc5",
            storageBucket: "my-queue-system-3bcc5.firebasestorage.app",
            messagingSenderId: "32354532851",
            appId: "1:32354532851:web:4ba48fcc31bb454399a686"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        let localCalled = { A: 0, B: 0, C: 0 };
        let isFirst = true;

        onValue(ref(db, 'queueSystem'), (snapshot) => {
            const data = snapshot.val() || {};
            ['A', 'B', 'C'].forEach(type => {
                const called = data[type]?.currentCalled || 0;
                const element = document.getElementById(`num${type}`);
                
                element.innerText = called > 0 ? type + String(called).padStart(3, '0') : type + "---";
                
                // 新號碼提醒閃爍
                if (!isFirst && called > localCalled[type]) {
                    element.classList.add('blink');
                    setTimeout(() => element.classList.remove('blink'), 5000); 
                    speak(type, called);
                }
                localCalled[type] = called;
            });
            isFirst = false;
        });

        // 專業化語音
        function speak(type, num) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                let groupStr = type === 'A' ? '一人 A' : type === 'B' ? '二至三人 B' : '四至五人 C';
                let text = `請 ${groupStr} ${num} 號到櫃檯`;
                let ut = new SpeechSynthesisUtterance(text);
                ut.lang = 'zh-HK'; ut.rate = 0.92;
                window.speechSynthesis.speak(ut);
            }
        }
    </script>
</body>
</html>
