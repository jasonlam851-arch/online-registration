<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中華文化週活動報名與查詢系統</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #fcf8f2; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; flex-direction: column; }
        .registration-container { background-color: #ffffff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(139,69,19,0.1); width: 100%; max-width: 580px; border-top: 6px solid #b22222; position: relative; box-sizing: border-box; }
        .version-tag { position: absolute; top: 10px; left: 15px; font-size: 11px; color: #aaaaaa; font-family: monospace; }
        h2 { margin-top: 10px; color: #b22222; text-align: center; margin-bottom: 5px; font-size: 24px; }
        .notice-banner { background-color: #fff5f5; border: 1px solid #ffe3e3; color: #d93838; padding: 10px; border-radius: 6px; text-align: center; font-weight: bold; margin-bottom: 20px; font-size: 14px; }
        
        /* 管理員登入與內容面板 */
        .admin-trigger-btn { position: absolute; top: 15px; right: 20px; background: none; border: 1px solid #cccccc; color: #666666; padding: 4px 10px; border-radius: 4px; font-size: 12px; cursor: pointer; transition: all 0.3s; }
        .admin-trigger-btn:hover { border-color: #b22222; color: #b22222; }
        .admin-panel { background-color: #f9f9f9; border: 1px dashed #cccccc; padding: 15px; border-radius: 6px; margin-bottom: 20px; display: none; width: 100%; box-sizing: border-box; }
        .admin-panel h3 { margin-top: 0; color: #333; font-size: 16px; border-bottom: 1px solid #ddd; padding-bottom: 5px; }
        .admin-login-form { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
        .admin-login-form input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; flex: 1; min-width: 120px; font-size: 14px; }
        .admin-btn { background-color: #444444; color: white; border: none; padding: 8px 15px; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 14px; }
        .admin-logout-btn { background-color: #d9534f; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; margin-top: 10px; }
        .admin-secret-content { background-color: #fff; border: 1px solid #ecc; padding: 12px; border-radius: 4px; margin-top: 10px; }
        .red-alert { color: #ff0000; font-weight: bold; margin: 0 0 8px 0; }
        .admin-link { display: inline-block; color: #0066cc; font-weight: bold; text-decoration: underline; word-break: break-all; }
        
        /* Tab 分頁與表單樣式 */
        .tab-container { display: flex; width: 100%; margin-bottom: 20px; border-bottom: 2px solid #eeeeee; }
        .tab-btn { flex: 1; text-align: center; padding: 12px; font-weight: bold; cursor: pointer; color: #777777; font-size: 15px; }
        .tab-btn.active { color: #b22222; border-bottom: 3px solid #b22222; }
        .form-section { display: none; }
        .form-section.active { display: block; }
        .form-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 6px; font-weight: 600; color: #444444; }
        input[type="text"], select { width: 100%; padding: 12px; border: 1px solid #cccccc; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        .submit-btn { width: 100%; background-color: #b22222; color: white; padding: 14px; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .cancel-btn { background-color: #d9534f; }
        .query-btn { background-color: #5bc0de; }
        .message-box { margin-top: 20px; padding: 15px; border-radius: 6px; display: none; text-align: center; font-weight: bold; }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .info { background-color: #e2f0fe; color: #004085; border: 1px solid #b8daff; }
    </style>
</head>
<body>

<div class="registration-container">
    <div class="version-tag">v0.01</div>
    <button class="admin-trigger-btn" onclick="toggleAdminPanel()">⚙️ 管理員登入</button>
    <h2>中華文化週活動報名系統</h2>
    <div class="notice-banner">💡 中文學會優先報名，名額有限，先到先得！</div>
    
    <div id="adminPanel" class="admin-panel">
        <h3>🔐 管理員控制台</h3>
        <div id="adminLoginForm" class="admin-login-form">
            <input type="text" id="adminAcc" placeholder="管理員帳號">
            <input type="password" id="adminPwd" placeholder="密碼">
            <button class="admin-btn" onclick="handleAdminLogin()">登入</button>
        </div>
        <div id="adminContent" style="display: none;">
            <div class="admin-secret-content">
                <p class="red-alert">⚠️ 以下是中華文化報名表格連結（請勿分享給學生）</p>
                <p>連結：<a class="admin-link" href="https://docs.google.com/spreadsheets/d/18jLhLWrz9y_vB9flRzoaXNQuqua-7-g_1Y9C1W2FJGY/edit?usp=sharing" target="_blank">點此開啟 Excel 報名表單</a></p>
            </div>
            <button class="admin-logout-btn" onclick="handleAdminLogout()">安全登出</button>
        </div>
    </div>
    
    <div class="tab-container">
        <div class="tab-btn active" id="tabRegister" onclick="switchTab('register')">活動報名</div>
        <div class="tab-btn" id="tabCheck" onclick="switchTab('check')">進度查詢</div>
        <div class="tab-btn" id="tabCancel" onclick="switchTab('cancel')">取消報名</div>
    </div>
    
    <div id="registerSection" class="form-section active">
        <form id="regForm" onsubmit="handleSubmit(event, 'register')">
            <div class="form-group"><label>學生真實姓名</label><input type="text" id="regName" required></div>
            <div class="form-group"><label>學生編號 (5位數)</label><input type="text" id="regId" required maxlength="5" pattern="\d{5}"></div>
            <div class="form-group"><label>班別</label>
                <select id="regClass" required>
                    <option value="">-- 請選擇 --</option>
                    <option value="1A">1A</option><option value="1B">1B</option><option value="1C">1C</option><option value="5A">5A</option><option value="5B">5B</option>
                </select>
            </div>
            <div class="form-group"><label>選擇活動場次</label><select id="regSession" required><option>-- 載入中... --</option></select></div>
            <button type="submit" class="submit-btn" id="regBtn">確認送出報名</button>
        </form>
    </div>

    <div id="checkSection" class="form-section">
        <form id="chkForm" onsubmit="handleSubmit(event, 'check')">
            <div class="form-group"><label>輸入學生編號</label><input type="text" id="chkId" required maxlength="5"></div>
            <button type="submit" class="submit-btn query-btn" id="chkBtn">查詢狀態</button>
        </form>
        <div id="queryResultArea" style="margin-top:15px; display:none;"><div id="tableContainer"></div></div>
    </div>

    <div id="cancelSection" class="form-section">
        <form id="canForm" onsubmit="handleSubmit(event, 'cancel')">
            <div class="form-group"><label>學生姓名</label><input type="text" id="canName" required></div>
            <div class="form-group"><label>學生編號</label><input type="text" id="canId" required maxlength="5"></div>
            <div class="form-group"><label>欲取消場次</label>
                <select id="canSession" required>
                    <option value="">-- 請選擇 --</option>
                    <option value="中華文化試食區 - 第一場 (09:00-09:30)">中華文化試食區 - 第一場 (09:00-09:30)</option>
                    <option value="中華文化試食區 - 第二場 (11:00-11:30)">中華文化試食區 - 第二場 (11:00-11:30)</option>
                    <option value="中華文化體驗活動區 - 第一場 (09:00-09:30)">中華文化體驗活動區 - 第一場 (09:00-09:30)</option>
                    <option value="中華文化體驗活動區 - 第二場 (11:00-11:30)">中華文化體驗活動區 - 第二場 (11:00-11:30)</option>
                </select>
            </div>
            <button type="submit" class="submit-btn cancel-btn" id="canBtn">確認申請取消</button>
        </form>
    </div>

    <div id="messageBox" class="message-box"></div>
</div>

<script>
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwZ2isiKG92FLsxaqryKWxYtIUjUC9JVcgZ5f-fpIXTPR30Qncz1h9SW8EGa5xr2VnUUg/exec";

    function toggleAdminPanel() { const p = document.getElementById('adminPanel'); p.style.display = (p.style.display === 'block') ? 'none' : 'block'; }
    function handleAdminLogin() {
        if (document.getElementById('adminAcc').value === "admin001" && document.getElementById('adminPwd').value === "Asdf1234") {
            document.getElementById('adminLoginForm').style.display = 'none';
            document.getElementById('adminContent').style.display = 'block';
        } else { alert("帳號密碼錯誤"); }
    }
    function handleAdminLogout() { location.reload(); }

    function fetchCounts() {
        fetch(`${GOOGLE_SCRIPT_URL}?method=get_counts`, { method: "POST" })
        .then(res => res.json()).then(resData => {
            let html = '<option value="">-- 請選擇活動 --</option>';
            for (let s in resData.data) {
                let r = resData.data[s];
                html += `<option value="${s}" ${r===0?'disabled':''}>${s} ${r===0?'【滿】':'【剩'+r+'】'}</option>`;
            }
            document.getElementById('regSession').innerHTML = html;
        });
    }

    function switchTab(type) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.form-section').forEach(s => s.classList.remove('active'));
        document.getElementById('tab'+type.charAt(0).toUpperCase()+type.slice(1)).classList.add('active');
        document.getElementById(type+'Section').classList.add('active');
        if(type==='register') fetchCounts();
    }

    function handleSubmit(e, type) {
        e.preventDefault();
        let url = `${GOOGLE_SCRIPT_URL}?method=${type}`;
        if(type==='register') url += `&name=${document.getElementById('regName').value}&studentId=${document.getElementById('regId').value}&userClass=${document.getElementById('regClass').value}&session=${document.getElementById('regSession').value}`;
        else if(type==='check') url += `&studentId=${document.getElementById('chkId').value}`;
        else if(type==='cancel') { if(!confirm("確定申請取消？")) return; url += `&name=${document.getElementById('canName').value}&studentId=${document.getElementById('canId').value}&session=${document.getElementById('canSession').value}`; }

        fetch(url, { method: "POST" }).then(res => res.json()).then(data => {
            if(type==='register' && data.result==='success') { alert("報名成功！"); location.reload(); }
            else if(type==='cancel' && data.result==='cancel_requested') { alert("已提交申請，待管理員處理。"); location.reload(); }
            else if(type==='check' && data.records) { 
                let html = '<table border="1" style="width:100%; border-collapse:collapse;"><tr><th>姓名</th><th>狀態</th></tr>';
                data.records.forEach(r => html += `<tr><td>${r.name}</td><td>${r.status}</td></tr>`);
                document.getElementById('tableContainer').innerHTML = html + '</table>';
                document.getElementById('queryResultArea').style.display = 'block';
            } else { alert("處理失敗或查無資料：" + data.result); }
        });
    }
    window.onload = fetchCounts;
</script>
</body>
</html>
